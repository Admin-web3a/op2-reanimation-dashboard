name: Daily OP2 Reanimation Dashboard

on:
  schedule:
    - cron: "0 4 * * *"   # 07:00 МСК
    - cron: "0 6 * * *"   # 09:00 МСК (резерв)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate dashboard
        env:
          AMO_TOKEN: ${{ secrets.AMO_TOKEN }}
        run: python generate_amo_report.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: update dashboard $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
